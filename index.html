        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedRegion, setSelectedRegion] = useState("All");
            const [sortOrder, setSortOrder] = useState("asc");

            const filteredDistilleries = useMemo(() => {
                return WHISKY_DATA
                    .filter(d => {
                        const matchesSearch = d.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                              d.town.toLowerCase().includes(searchTerm.toLowerCase());
                        const matchesRegion = selectedRegion === "All" || d.region === selectedRegion;
                        return matchesSearch && matchesRegion;
                    })
                    .sort((a, b) => sortOrder === "asc" ? a.year - b.year : b.year - a.year);
            }, [searchTerm, selectedRegion, sortOrder]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8 border-b border-stone-200 pb-6">

                            </div>

                                    placeholder="Search by name or town..."
                                    className="w-full px-4 py-2 bg-white border border-stone-200 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none shadow-sm"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">

                                <h3 className="font-bold text-stone-700 mb-4 uppercase text-xs tracking-widest">Browse Regions</h3>
                                <div className="flex flex-col gap-1">
                                    {REGIONS.map(region => (
                                        <button
                                            key={region}
                                            onClick={() => setSelectedRegion(region)}
                                            className={`text-left px-3 py-2 rounded-md transition-colors ${selectedRegion === region ? "bg-amber-100 text-amber-900 font-medium" : "hover:bg-stone-100 text-stone-600"}`}
                                        >
                                            {region}
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="bg-amber-900 text-white p-5 rounded-xl shadow-md">
                                <h3 className="font-bold mb-3">Heritage Sort</h3>
                                <div className="flex bg-amber-800/50 p-1 rounded-lg">
                                    <button onClick={() => setSortOrder('asc')} className={`flex-1 py-1.5 text-sm rounded ${sortOrder === 'asc' ? 'bg-amber-600 shadow' : ''}`}>Oldest</button>
                                    <button onClick={() => setSortOrder('desc')} className={`flex-1 py-1.5 text-sm rounded ${sortOrder === 'desc' ? 'bg-amber-600 shadow' : ''}`}>Newest</button>
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-3 space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filteredDistilleries.map(distillery => (
                                    <div key={distillery.name} className="bg-white p-5 rounded-xl border border-stone-200 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <h2 className="text-xl font-bold text-stone-800">{distillery.name}</h2>
                                                <p className="text-stone-500 text-sm">📍 {distillery.town}, {distillery.region}</p>
                                            </div>
                                            <span className="font-mono text-stone-400 text-sm">📅 {distillery.year}</span>
                                        </div>
                                        <div className="space-y-3">
                                            <div>
                                                <span className="text-[10px] font-bold text-stone-400 uppercase block mb-1">Top Expressions</span>
                                                <div className="flex flex-wrap gap-1.5">

                                                        <span key={exp} className="bg-stone-100 text-stone-600 text-[11px] px-2 py-0.5 rounded-md border border-stone-200">{exp}</span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="pt-3 border-t border-stone-100">
                                                <p className="text-sm text-stone-700 italic">"{distillery.profiles}"</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
